<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>📦 AppStock Mobile</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{-webkit-tap-highlight-color:transparent;touch-action:manipulation;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;overscroll-behavior:none;background:#0f172a}
    .dvh{height:100dvh}
    .pt-safe{padding-top:env(safe-area-inset-top,16px)}
    .pb-safe{padding-bottom:env(safe-area-inset-bottom,16px)}
    .sheet{transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
    .sheet.open{transform:translateY(0)}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    .item-card:active{opacity:.7}
    .btn-tap:active{opacity:.75;transform:scale(.97)}
  </style>
</head>
<body class="text-white select-none">

<!-- ══════════════════════════════════════════
     SCREEN 1 : LOGIN
══════════════════════════════════════════ -->
<div id="sLogin" class="dvh flex flex-col items-center justify-center p-6 gap-4">
  <div class="text-center mb-2">
    <div class="text-7xl mb-3">📦</div>
    <h1 class="text-3xl font-black tracking-tight">AppStock</h1>
    <p class="text-slate-400 text-sm mt-1">ระบบจัดการสต๊อก</p>
  </div>
  <div class="w-full max-w-xs space-y-3">
    <input id="lUser" type="text" inputmode="text" placeholder="👤 ชื่อพนักงาน" autocomplete="username"
      class="w-full bg-slate-800 border-2 border-slate-700 text-white p-4 rounded-2xl text-center text-lg font-bold outline-none focus:border-indigo-500 transition-colors">
    <input id="lPass" type="password" placeholder="🔑 รหัสผ่าน" autocomplete="current-password"
      class="w-full bg-slate-800 border-2 border-slate-700 text-white p-4 rounded-2xl text-center text-lg font-bold outline-none focus:border-indigo-500 transition-colors">
    <button onclick="doLogin()" id="lBtn"
      class="btn-tap w-full bg-indigo-600 text-white p-4 rounded-2xl text-xl font-black shadow-lg">
      เข้าสู่ระบบ →
    </button>
    <p id="lErr" class="text-red-400 text-center text-sm font-bold hidden"></p>
  </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 2 : MODULE SELECT
══════════════════════════════════════════ -->
<div id="sModule" class="dvh hidden flex-col p-5 pt-safe gap-4">
  <div class="pt-4">
    <p class="text-slate-400 text-sm">สวัสดี 👋</p>
    <h2 id="mGreet" class="text-2xl font-black"></h2>
  </div>
  <p class="text-slate-500 text-xs font-black uppercase tracking-widest">เลือกโมดูล</p>

  <button onclick="selectModule('SQF')"
    class="btn-tap bg-orange-600/90 rounded-3xl p-6 text-left shadow-xl">
    <div class="text-4xl mb-2">🏭</div>
    <div class="text-xl font-black">วัตถุดิบ SQF</div>
    <div class="text-orange-200 text-sm mt-1">สุพรรณคิวฟู้ดส์ · เบิก / รับเข้า</div>
  </button>

  <button onclick="selectModule('MLM')"
    class="btn-tap bg-blue-600/90 rounded-3xl p-6 text-left shadow-xl">
    <div class="text-4xl mb-2">🏭</div>
    <div class="text-xl font-black">วัตถุดิบ MLM</div>
    <div class="text-blue-200 text-sm mt-1">แม่ละมาย · เบิก / รับเข้า</div>
  </button>

  <button onclick="selectModule('COLDROOM')"
    class="btn-tap bg-cyan-700/90 rounded-3xl p-6 text-left shadow-xl">
    <div class="text-4xl mb-2">❄️</div>
    <div class="text-xl font-black">คลังสินค้า Cold Room</div>
    <div class="text-cyan-200 text-sm mt-1">SQF · ดูสต๊อกเท่านั้น</div>
  </button>

  <div class="flex gap-3 mt-2">
    <button onclick="switchToDesktop()"
      class="flex-1 bg-slate-800 text-slate-300 py-3 rounded-2xl text-sm font-black active:brightness-75">
      💻 โหมดคอมพิวเตอร์
    </button>
    <button onclick="doLogout()"
      class="flex-1 bg-slate-800 text-red-400 py-3 rounded-2xl text-sm font-black active:brightness-75">
      ออกจากระบบ
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 3 : MAIN (LIST)
══════════════════════════════════════════ -->
<div id="sMain" class="dvh hidden flex-col">

  <!-- Header -->
  <div class="flex-shrink-0 flex items-center gap-3 px-4 pt-safe bg-slate-900 border-b border-slate-800 pb-3"
       style="padding-top:calc(env(safe-area-inset-top,12px) + 12px)">
    <button onclick="goModuleSelect()" class="text-slate-400 text-3xl leading-none pr-1">‹</button>
    <div class="flex-1 min-w-0">
      <div id="mTitle" class="font-black text-lg leading-tight truncate"></div>
      <div id="mSub"   class="text-slate-500 text-xs"></div>
    </div>
    <button onclick="loadData()" class="text-slate-500 text-xl">↻</button>
  </div>

  <!-- Scan button + Search -->
  <div class="flex-shrink-0 p-3 space-y-2 bg-slate-900">
    <button onclick="openScanner()"
      class="btn-tap w-full bg-indigo-600 py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-lg">
      📷 สแกน Barcode / QR Code
    </button>
    <input id="mSearch" type="search" placeholder="🔍 ค้นหาชื่อหรือรหัส..." oninput="filterList()"
      class="w-full bg-slate-800 text-white p-3 rounded-xl outline-none border border-slate-700 focus:border-indigo-500 text-sm">
  </div>

  <!-- List -->
  <div id="mList" class="flex-1 overflow-y-auto px-3 pt-2 pb-24 space-y-2"></div>

  <!-- Bottom Nav -->
  <nav class="flex-shrink-0 fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur border-t border-slate-800
              flex pb-safe z-10">
    <button onclick="showTab('list')" id="navList"
      class="flex-1 py-3 flex flex-col items-center gap-0.5 text-indigo-400">
      <span class="text-2xl">📋</span><span class="text-[10px] font-black">สต๊อก</span>
    </button>
    <button onclick="openScanner()"
      class="flex-1 py-3 flex flex-col items-center gap-0.5 text-slate-500">
      <span class="text-2xl">📷</span><span class="text-[10px] font-black">สแกน</span>
    </button>
    <button onclick="showTab('qr')" id="navQr"
      class="flex-1 py-3 flex flex-col items-center gap-0.5 text-slate-500">
      <span class="text-2xl">🏷️</span><span class="text-[10px] font-black">QR Code</span>
    </button>
  </nav>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 4 : QR GENERATOR (slides over main)
══════════════════════════════════════════ -->
<div id="sQR" class="hidden fixed inset-0 bg-slate-900 flex-col z-20 dvh">

  <div class="flex-shrink-0 flex items-center gap-3 px-4 border-b border-slate-800 pb-3"
       style="padding-top:calc(env(safe-area-inset-top,12px) + 12px)">
    <button onclick="closeQR()" class="text-slate-400 text-3xl leading-none pr-1">‹</button>
    <div class="font-black text-lg flex-1">🏷️ QR สำหรับจุดวาง</div>
    <button onclick="printQR()"
      class="btn-tap bg-white text-slate-900 px-4 py-2 rounded-xl font-black text-sm">🖨️ พิมพ์</button>
  </div>

  <!-- Module filter -->
  <div class="flex-shrink-0 flex gap-2 p-3">
    <button onclick="setQrModule('SQF')" id="qBtnSQF"
      class="flex-1 py-2 rounded-xl font-black text-sm bg-orange-600 text-white">🏭 SQF</button>
    <button onclick="setQrModule('MLM')" id="qBtnMLM"
      class="flex-1 py-2 rounded-xl font-black text-sm bg-slate-700 text-slate-400">🏭 MLM</button>
  </div>

  <div id="qrList" class="flex-1 overflow-y-auto p-3 pb-8 space-y-3"></div>
</div>

<!-- ══════════════════════════════════════════
     SCANNER (fullscreen overlay)
══════════════════════════════════════════ -->
<div id="sScanner" class="hidden fixed inset-0 bg-black flex-col z-50">
  <div class="flex-shrink-0 flex items-center gap-3 px-4 py-4 pt-safe">
    <button onclick="closeScanner()" class="text-white text-3xl">✕</button>
    <div class="font-black text-white flex-1 text-center text-lg">สแกน Barcode / QR</div>
    <div class="w-8"></div>
  </div>
  <div class="flex-1 relative overflow-hidden">
    <div id="scanEl" class="w-full h-full"></div>
    <!-- Frame overlay -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
      <div class="relative w-64 h-52">
        <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-indigo-400 rounded-tl-lg"></div>
        <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-indigo-400 rounded-tr-lg"></div>
        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-indigo-400 rounded-bl-lg"></div>
        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-indigo-400 rounded-br-lg"></div>
        <div id="scanLine" class="absolute left-1 right-1 h-0.5 bg-indigo-400/80 rounded animate-bounce top-1/2"></div>
      </div>
    </div>
  </div>
  <p class="flex-shrink-0 text-slate-400 text-sm text-center py-4 pb-safe">
    เล็งกล้องไปที่ Barcode หรือ QR Code ของสินค้า
  </p>
</div>

<!-- ══════════════════════════════════════════
     ACTION BOTTOM SHEET
══════════════════════════════════════════ -->
<div id="actionOverlay" class="hidden fixed inset-0 z-30">
  <div onclick="closeAction()" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
  <div id="actionSheet"
       class="sheet absolute bottom-0 left-0 right-0 bg-slate-800 rounded-t-3xl overflow-hidden shadow-2xl">
    <!-- Handle -->
    <div class="flex justify-center pt-3 pb-1">
      <div class="w-10 h-1 bg-slate-600 rounded-full"></div>
    </div>
    <!-- Product Info -->
    <div class="px-6 pt-2 pb-4 text-center border-b border-slate-700">
      <h3 id="aName" class="text-xl font-black leading-tight"></h3>
      <p  id="aSku"  class="text-slate-500 text-xs mt-1"></p>
      <div class="flex justify-center items-end gap-6 mt-4">
        <div class="text-center">
          <div id="aQty"  class="text-5xl font-black text-indigo-400 leading-none"></div>
          <div id="aUnit" class="text-slate-400 text-xs mt-1">คงเหลือ</div>
        </div>
        <div id="aDaysWrap" class="text-center hidden">
          <div id="aDays" class="text-5xl font-black leading-none"></div>
          <div class="text-slate-400 text-xs mt-1">วันที่ใช้ได้</div>
        </div>
      </div>
      <div id="aWarn" class="hidden mt-3 bg-red-500/20 text-red-400 text-xs font-black px-3 py-1.5 rounded-full inline-block">
        ⚠️ ต่ำกว่าขั้นต่ำ!
      </div>
    </div>

    <!-- IN/OUT Toggle -->
    <div id="aTypeRow" class="flex gap-3 px-6 pt-4">
      <button onclick="setType('OUT')" id="aBtnOut"
        class="flex-1 py-4 rounded-2xl font-black text-lg bg-orange-600 text-white">📤 เบิก</button>
      <button onclick="setType('IN')"  id="aBtnIn"
        class="flex-1 py-4 rounded-2xl font-black text-lg bg-slate-700 text-slate-400">📥 รับ</button>
    </div>

    <!-- Qty -->
    <div id="aInputRow" class="px-6 pt-3">
      <div class="flex items-center gap-3 bg-slate-900 rounded-2xl px-3 py-2">
        <button onclick="adjQty(-1)"
          class="btn-tap w-14 h-14 text-3xl text-slate-400 font-black flex items-center justify-center">−</button>
        <input id="aQtyIn" type="number" inputmode="numeric" min="1" value="1"
          class="flex-1 bg-transparent text-white text-5xl font-black text-center outline-none py-2">
        <button onclick="adjQty(1)"
          class="btn-tap w-14 h-14 text-3xl text-slate-400 font-black flex items-center justify-center">+</button>
      </div>
    </div>

    <!-- Confirm -->
    <div id="aConfirmRow" class="px-6 pt-3 pb-safe pb-6">
      <button onclick="confirmAction()" id="aConfirm"
        class="btn-tap w-full py-5 rounded-2xl font-black text-xl bg-indigo-600 text-white shadow-lg">
        ✅ ยืนยัน
      </button>
    </div>

    <!-- Cold Room view-only note -->
    <div id="aColdNote" class="hidden px-6 pb-safe pb-6">
      <div class="bg-cyan-900/40 text-cyan-300 text-sm font-bold text-center py-3 rounded-2xl">
        ❄️ Cold Room — ดูข้อมูลเท่านั้น
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed top-4 left-4 right-4 z-[999] p-4 rounded-2xl
     font-black text-center text-white text-sm shadow-2xl transition-all"></div>

<!-- Loading -->
<div id="loading" class="hidden fixed inset-0 z-[998] bg-black/50 backdrop-blur-sm
     flex items-center justify-center">
  <div class="bg-slate-800 rounded-3xl px-8 py-5 text-white font-black text-lg shadow-2xl">
    ⏳ กำลังโหลด...
  </div>
</div>

<!-- ══════════════════════════════════════════
     CDN SCRIPTS
══════════════════════════════════════════ -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
// ─────────────────────────────────────────────
// CONFIG  — เปลี่ยน URL ให้ตรงกับ GAS deployment
// ─────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbx72vWVvUgaOgZEnzAc8ltaV-a7Rfx_CL9DK1c-B5nAIOxtrlnbi8_b6bmfnDeAZ_xeaw/exec";

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
// Auto-login จาก localStorage (shared กับ index.html)
let user = localStorage.getItem("unified_stock_user") || null;
let role = localStorage.getItem("unified_stock_role") || null;
let mod  = null;           // "SQF" | "MLM" | "COLDROOM"
let data = [];             // full material list
let filt = [];             // filtered list
let sel  = null;           // selected item for action sheet
let aType = "OUT";         // current action type
let scanner = null;        // Html5Qrcode instance
let qrMod = "SQF";         // current QR generator module
let qrCache = {};          // { SQF: [...], MLM: [...] }

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
const $  = id => document.getElementById(id);
const show = id => $( id).classList.remove("hidden");
const hide = id => $( id).classList.add("hidden");

function showScreens(...ids) {
  ["sLogin","sModule","sMain","sQR","sScanner"].forEach(s =>
    ids.includes(s) ? show(s) : hide(s)
  );
  // Also ensure flex display for screens that need it
  ids.forEach(id => {
    const el = $(id);
    if (el && el.classList.contains("flex-col")) el.style.display = "flex";
  });
}

let _toastT;
function toast(msg, type = "ok") {
  const el = $("toast");
  el.textContent = msg;
  el.className = "fixed top-4 left-4 right-4 z-[999] p-4 rounded-2xl font-black text-center text-white text-sm shadow-2xl";
  el.classList.add(type === "err" ? "bg-red-600" : type === "warn" ? "bg-amber-500" : "bg-emerald-600");
  show("toast");
  clearTimeout(_toastT);
  _toastT = setTimeout(() => hide("toast"), 3000);
}

function setLoading(on, msg = "กำลังโหลด...") {
  $("loading").querySelector("div").textContent = "⏳ " + msg;
  on ? show("loading") : hide("loading");
}

async function gasPost(body) {
  const r = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ ...body, deviceName: "AppStock Mobile/" + (navigator.userAgent.slice(0,30)) })
  });
  return r.json();
}

function daysColor(d) {
  if (d <= 0)  return "#ef4444";
  if (d <= 7)  return "#ef4444";
  if (d <= 14) return "#f97316";
  if (d <= 30) return "#eab308";
  return "#22c55e";
}

// ─────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// INIT — auto-login if session exists
// ─────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  if (user) {
    $("mGreet").textContent = user;
    $("sModule").style.display = "";
    showScreens("sModule");
  } else {
    showScreens("sLogin");
  }
});

$("lPass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
$("lUser").addEventListener("keydown", e => { if (e.key === "Enter") $("lPass").focus(); });

async function doLogin() {
  const u = $("lUser").value.trim();
  const p = $("lPass").value;
  const errEl = $("lErr");
  hide("lErr");
  if (!u || !p) { errEl.textContent = "กรุณากรอกชื่อและรหัสผ่าน"; show("lErr"); return; }
  $("lBtn").textContent = "กำลังเข้าสู่ระบบ..."; $("lBtn").disabled = true;
  setLoading(true, "กำลังเข้าสู่ระบบ...");
  try {
    const r = await gasPost({ action: "verifyUser", payload: { username: u, password: p } });
    setLoading(false); $("lBtn").textContent = "เข้าสู่ระบบ →"; $("lBtn").disabled = false;
    if (r.ok) {
      user = u; role = r.role;
      // บันทึก session เดียวกับ index.html
      localStorage.setItem("unified_stock_user", u);
      localStorage.setItem("unified_stock_role",  r.role || "user");
      localStorage.setItem("appstock_mode_pref",  "mobile");
      $("mGreet").textContent = u;
      $("lPass").value = "";
      hide("lErr");
      $("sModule").style.display = "";
      showScreens("sModule");
    } else {
      errEl.textContent = r.message || "เข้าสู่ระบบไม่สำเร็จ"; show("lErr");
    }
  } catch(e) {
    setLoading(false); $("lBtn").textContent = "เข้าสู่ระบบ →"; $("lBtn").disabled = false;
    errEl.textContent = "เชื่อมต่อ GAS ไม่สำเร็จ"; show("lErr");
  }
}

function doLogout() {
  // ล้าง session และ mode pref → กลับ index.html
  ["unified_stock_user","unified_stock_role","appstock_mode_pref"].forEach(k => localStorage.removeItem(k));
  user = null; role = null; mod = null; data = [];
  window.location.href = "index.html";
}

function switchToDesktop() {
  localStorage.setItem("appstock_mode_pref", "desktop");
  window.location.href = "index.html";
}

// ─────────────────────────────────────────────
// MODULE SELECT
// ─────────────────────────────────────────────
const MOD_CFG = {
  SQF:      { title: "วัตถุดิบ SQF",         sub: "สุพรรณคิวฟู้ดส์", canEdit: true },
  MLM:      { title: "วัตถุดิบ MLM",         sub: "แม่ละมาย",        canEdit: true },
  COLDROOM: { title: "❄️ Cold Room",          sub: "ดูสต๊อกเท่านั้น", canEdit: false }
};

async function selectModule(m) {
  mod = m;
  const cfg = MOD_CFG[m];
  $("mTitle").textContent = cfg.title;
  $("mSub").textContent   = user + " · " + cfg.sub;
  showScreens("sMain");
  await loadData();
}

function goModuleSelect() {
  closeScanner();
  $("sModule").style.display = "";
  showScreens("sModule");
}

// ─────────────────────────────────────────────
// LOAD DATA
// ─────────────────────────────────────────────
async function loadData() {
  setLoading(true, "กำลังโหลดข้อมูล...");
  try {
    if (mod === "COLDROOM") {
      const r = await gasPost({ module: "COLDROOM", action: "getProductAndBalances", payload: { barcode: "" } });
      setLoading(false);
      // Aggregate allLots by barcode
      const byBc = {};
      (r.allLots || []).forEach(lot => {
        const bc = String(lot.Barcode || "");
        if (!byBc[bc]) byBc[bc] = { sku: bc, name: lot.ProductName || "", qty: 0, unit: lot.Unit || "", min: 0, daily: 0, cr: true };
        byBc[bc].qty += Number(lot.Qty || 0);
      });
      data = Object.values(byBc).filter(i => i.qty > 0).sort((a,b) => a.name.localeCompare(b.name,"th"));
    } else {
      const res = await fetch(`${GAS_URL}?module=${mod}`);
      const r   = await res.json();
      setLoading(false);
      data = (r.materials || [])
        .filter(m => !m.Discontinued)
        .map(m => ({
          sku:   String(m.SKU   || ""),
          name:  m.Name  || "",
          qty:   Number(m.Qty   || 0),
          unit:  m.Unit  || "",
          min:   Number(m.Min   || 0),
          daily: Number(m.DailyUsage || 0),
          cr:    false
        }))
        .sort((a, b) => a.name.localeCompare(b.name, "th"));
      // cache for QR generator
      qrCache[mod] = data.map(d => ({ sku: d.sku, name: d.name, qty: d.qty, unit: d.unit }));
    }
    filt = [...data];
    renderList();
    toast("โหลดข้อมูลสำเร็จ · " + data.length + " รายการ");
  } catch(e) { setLoading(false); toast("โหลดไม่สำเร็จ: " + e.message, "err"); }
}

// ─────────────────────────────────────────────
// LIST RENDER
// ─────────────────────────────────────────────
function filterList() {
  const q = $("mSearch").value.trim().toLowerCase();
  filt = q ? data.filter(d => d.name.toLowerCase().includes(q) || d.sku.toLowerCase().includes(q)) : [...data];
  renderList();
}

function renderList() {
  const el = $("mList");
  if (!filt.length) {
    el.innerHTML = '<p class="text-slate-600 text-center py-16 font-bold">ไม่พบรายการ</p>';
    return;
  }
  el.innerHTML = filt.map(item => {
    const isLow  = item.min > 0 && item.qty <= item.min;
    const days   = item.daily > 0 ? Math.floor(item.qty / item.daily) : null;
    const dayStr = days !== null
      ? `<span class="font-black text-xs" style="color:${daysColor(days)}">${days} วัน</span>` : "";
    return `
    <button onclick='pickItem("${item.sku}")'
      class="item-card w-full bg-slate-800 rounded-2xl p-4 text-left border-2 ${isLow ? "border-red-500/60" : "border-transparent"}">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="font-black text-white leading-snug">${item.name}</div>
          <div class="text-slate-500 text-xs mt-0.5">${item.sku}</div>
          ${isLow ? '<div class="text-red-400 text-xs font-black mt-1">⚠️ ต่ำกว่าขั้นต่ำ (ขั้นต่ำ: '+item.min+' '+item.unit+')</div>' : ""}
        </div>
        <div class="text-right flex-shrink-0">
          <div class="font-black text-indigo-300 text-xl leading-none">${item.qty}</div>
          <div class="text-slate-500 text-xs">${item.unit}</div>
          ${dayStr ? '<div class="mt-0.5">'+dayStr+'</div>' : ""}
        </div>
      </div>
    </button>`;
  }).join("");
}

// ─────────────────────────────────────────────
// ACTION SHEET
// ─────────────────────────────────────────────
function pickItem(sku) {
  sel = data.find(d => d.sku === sku);
  if (!sel) return;
  const cfg = MOD_CFG[mod];

  $("aName").textContent = sel.name;
  $("aSku").textContent  = sel.sku + (cfg ? " · " + cfg.sub : "");
  $("aQty").textContent  = sel.qty;
  $("aUnit").textContent = "คงเหลือ (" + sel.unit + ")";
  $("aQtyIn").value = 1;

  if (sel.daily > 0) {
    const d = Math.floor(sel.qty / sel.daily);
    $("aDays").textContent = d;
    $("aDays").style.color = daysColor(d);
    show("aDaysWrap");
  } else { hide("aDaysWrap"); }

  if (sel.min > 0 && sel.qty <= sel.min) show("aWarn"); else hide("aWarn");

  if (sel.cr) {
    // Cold Room — view only
    hide("aTypeRow"); hide("aInputRow"); hide("aConfirmRow");
    show("aColdNote");
  } else {
    show("aTypeRow"); show("aInputRow"); show("aConfirmRow");
    hide("aColdNote");
    setType("OUT");
  }

  show("actionOverlay");
  requestAnimationFrame(() => {
    requestAnimationFrame(() => $("actionSheet").classList.add("open"));
  });
}

function closeAction() {
  $("actionSheet").classList.remove("open");
  setTimeout(() => hide("actionOverlay"), 300);
}

function setType(t) {
  aType = t;
  $("aBtnOut").className = t === "OUT"
    ? "flex-1 py-4 rounded-2xl font-black text-lg bg-orange-600 text-white"
    : "flex-1 py-4 rounded-2xl font-black text-lg bg-slate-700 text-slate-400";
  $("aBtnIn").className  = t === "IN"
    ? "flex-1 py-4 rounded-2xl font-black text-lg bg-emerald-600 text-white"
    : "flex-1 py-4 rounded-2xl font-black text-lg bg-slate-700 text-slate-400";
}

function adjQty(d) {
  const el = $("aQtyIn");
  el.value = Math.max(1, (Number(el.value) || 1) + d);
}

async function confirmAction() {
  if (!sel) return;
  const qty = Number($("aQtyIn").value) || 0;
  if (qty <= 0) { toast("ระบุจำนวนให้ถูกต้อง", "warn"); return; }
  if (aType === "OUT" && qty > sel.qty) {
    toast(`⚠️ สต๊อกไม่พอ — มี ${sel.qty} ${sel.unit}`, "err"); return;
  }
  const btn = $("aConfirm");
  btn.disabled = true; btn.textContent = "กำลังบันทึก...";
  setLoading(true, aType === "OUT" ? "กำลังบันทึกการเบิก..." : "กำลังบันทึกรับเข้า...");
  try {
    const r = await gasPost({ module: mod, action: "UPDATE", sku: sel.sku, type: aType, qty, user });
    setLoading(false); btn.disabled = false; btn.textContent = "✅ ยืนยัน";
    if (r.status === "success") {
      const label = aType === "OUT" ? "📤 เบิก" : "📥 รับ";
      toast(`${label} ${qty} ${sel.unit} · ${sel.name}`);
      closeAction();
      await loadData();
    } else { toast(r.message || "บันทึกไม่สำเร็จ", "err"); }
  } catch(e) {
    setLoading(false); btn.disabled = false; btn.textContent = "✅ ยืนยัน";
    toast("เกิดข้อผิดพลาด: " + e.message, "err");
  }
}

// ─────────────────────────────────────────────
// SCANNER
// ─────────────────────────────────────────────
function openScanner() {
  show("sScanner"); $("sScanner").style.display = "flex";
  if (scanner) { try { scanner.stop().catch(()=>{}); } catch(e){} scanner = null; }
  $("scanEl").innerHTML = "";
  scanner = new Html5Qrcode("scanEl");
  scanner.start(
    { facingMode: "environment" },
    {
      fps: 12,
      qrbox: { width: 240, height: 180 },
      aspectRatio: 1.333,
    },
    onScan,
    () => {}   // ignore errors during scanning
  ).catch(err => {
    toast("เปิดกล้องไม่สำเร็จ", "err");
    closeScanner();
  });
}

function closeScanner() {
  if (scanner) {
    try { scanner.stop().catch(() => {}); } catch(e) {}
    scanner = null;
  }
  $("scanEl").innerHTML = "";
  hide("sScanner");
}

function onScan(decoded) {
  if (navigator.vibrate) navigator.vibrate([40, 20, 40]);
  closeScanner();

  // Try JSON QR from our system: {"m":"SQF","s":"SKU-001"}
  try {
    const obj = JSON.parse(decoded);
    if (obj.m && obj.s) {
      if (obj.m !== mod) {
        // Switch module if needed
        if (obj.m === "SQF" || obj.m === "MLM") {
          toast("QR นี้เป็นของ " + obj.m + " กำลังเปลี่ยนโมดูล...", "warn");
          selectModule(obj.m).then(() => pickItem(obj.s));
        } else {
          toast("QR นี้เป็นของ " + obj.m, "warn");
        }
        return;
      }
      const item = data.find(d => d.sku === obj.s);
      if (item) { pickItem(obj.s); return; }
      toast("ไม่พบรหัส " + obj.s, "warn"); return;
    }
  } catch(e) { /* not JSON */ }

  // Try match as raw SKU or barcode
  const found = data.find(d =>
    String(d.sku).toLowerCase() === decoded.toLowerCase() ||
    String(d.sku)               === decoded
  );
  if (found) { pickItem(found.sku); return; }

  toast("ไม่พบสินค้า: " + decoded.slice(0, 24), "warn");
}

// ─────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────
function showTab(tab) {
  if (tab === "qr") {
    show("sQR"); $("sQR").style.display = "flex";
    setQrModule(qrMod);
  }
}
function closeQR() { hide("sQR"); }

// ─────────────────────────────────────────────
// QR GENERATOR
// ─────────────────────────────────────────────
async function setQrModule(m) {
  qrMod = m;
  $("qBtnSQF").className = m === "SQF"
    ? "flex-1 py-2 rounded-xl font-black text-sm bg-orange-600 text-white"
    : "flex-1 py-2 rounded-xl font-black text-sm bg-slate-700 text-slate-400";
  $("qBtnMLM").className = m === "MLM"
    ? "flex-1 py-2 rounded-xl font-black text-sm bg-blue-600 text-white"
    : "flex-1 py-2 rounded-xl font-black text-sm bg-slate-700 text-slate-400";

  if (!qrCache[m]) {
    setLoading(true, "กำลังโหลดรายการ...");
    try {
      const res = await fetch(`${GAS_URL}?module=${m}`);
      const r   = await res.json();
      setLoading(false);
      qrCache[m] = (r.materials || []).filter(x => !x.Discontinued).map(x => ({
        sku: String(x.SKU || ""), name: x.Name || "", qty: Number(x.Qty || 0), unit: x.Unit || ""
      }));
    } catch(e) { setLoading(false); toast("โหลดไม่สำเร็จ", "err"); return; }
  }
  renderQrList();
}

function renderQrList() {
  const items = qrCache[qrMod] || [];
  const el = $("qrList");
  if (!items.length) {
    el.innerHTML = '<p class="text-slate-600 text-center py-10 font-bold">ไม่มีรายการ</p>'; return;
  }
  el.innerHTML = items.map((item, i) => `
    <div class="bg-slate-800 rounded-2xl p-4 flex items-center gap-4">
      <canvas id="qc${i}" class="rounded-xl flex-shrink-0 bg-white p-1"></canvas>
      <div class="flex-1 min-w-0">
        <div class="font-black text-white text-sm leading-snug">${item.name}</div>
        <div class="text-slate-500 text-xs mt-0.5">${item.sku}</div>
        <div class="text-slate-600 text-xs">คงเหลือ: ${item.qty} ${item.unit}</div>
      </div>
    </div>`).join("");

  // Generate QR codes
  items.forEach((item, i) => {
    const canvas = $("qc" + i);
    if (!canvas) return;
    QRCode.toCanvas(canvas, JSON.stringify({ m: qrMod, s: item.sku }), {
      width: 72, margin: 1, color: { dark: "#000", light: "#fff" }
    });
  });
}

  if (!items.length) { toast("ไม่มีรายการ", "warn"); return; }
  const win = window.open("", "_blank");

</script>
